<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Sign in to continue learning</p>
    </div>
    <form class="auth-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label>Username</label>
        <input type="text" placeholder="Enter your username" formControlName="username">
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" formControlName="password">
      </div>
      <button class="auth-btn" type="submit"
              [disabled]="loading()">{{loading() ? 'Signing in...' : 'Sign In'}}</button>
    </form>

    @if(success()){
      <p class="msg msg--success">{{success()}}</p>
    }
    @if(error()){
      <p class="msg msg--error">{{error()}}</p>
    }

    <p class="auth-footer">Don't have an account? <a routerLink="/register">Create one</a></p>
  </div>
</section>
